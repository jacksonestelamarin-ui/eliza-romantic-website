<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e7eef7"/>
      <stop offset="45%" stop-color="#d8e3f0"/>
      <stop offset="75%" stop-color="#e9e1ee"/>
      <stop offset="100%" stop-color="#f3e9ef"/>
    </linearGradient>
    <linearGradient id="mtn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c2cad6"/>
      <stop offset="100%" stop-color="#aeb8c7"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="1000" fill="url(#sky)"/>
  <!-- distant hills -->
  <path d="M0 720 C300 660 520 700 820 670 C1120 640 1340 690 1600 650 L1600 1000 L0 1000 Z" fill="url(#mtn)" opacity="0.6"/>
  <!-- simple temple silhouette as a gentle placeholder -->
  <g fill="#b9c4d4" opacity="0.55">
    <rect x="640" y="640" width="320" height="120"/>
    <path d="M640 640 L800 540 L960 640 Z"/>
    <rect x="700" y="520" width="40" height="240"/>
    <rect x="860" y="520" width="40" height="240"/>
    <path d="M700 520 L720 470 L740 520 Z"/>
    <path d="M860 520 L880 470 L900 520 Z"/>
    <!-- central spire -->
    <rect x="788" y="470" width="24" height="170"/>
    <path d="M788 470 L800 420 L812 470 Z"/>
    <circle cx="800" cy="410" r="10"/>
  </g>
  <text x="800" y="900" text-anchor="middle" font-family="Georgia, serif" font-size="34" fill="#7a93a8" opacity="0.7">Provo Utah Temple</text>
</svg>
